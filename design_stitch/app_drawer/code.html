<style>
    .glass-panel {
      background: rgba(13, 13, 26, 0.4);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .icon-fill {
      font-variation-settings: 'FILL' 1;
    }
  </style>

    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<!-- Background Home Screen Mockup (Blurred) -->
<div class="fixed inset-0 z-0 overflow-hidden scale-105 blur-md opacity-40">
<div class="absolute inset-0 bg-gradient-to-tr from-surface via-surface-container to-secondary-container/20"></div>
<div class="flex flex-col items-center justify-center h-full">
<h1 class="font-headline font-thin text-9xl text-on-surface opacity-20">12:48</h1>
<div class="mt-8 grid grid-cols-4 gap-8">
<div class="w-16 h-16 rounded-2xl bg-white/5 border border-white/10"></div>
<div class="w-16 h-16 rounded-2xl bg-white/5 border border-white/10"></div>
<div class="w-16 h-16 rounded-2xl bg-white/5 border border-white/10"></div>
<div class="w-16 h-16 rounded-2xl bg-white/5 border border-white/10"></div>
</div>
</div>
</div>
<!-- App Drawer Scrim Overlay -->
<div class="fixed inset-0 bg-black/40 z-10"></div>
<!-- Main Content Wrapper -->
<div class="relative z-20 h-screen w-full flex flex-col justify-end">
<!-- TopAppBar Section (Using JSON Hierarchy) -->
<header class="flex flex-col items-start w-full pt-12 px-8 max-w-7xl mx-auto flex-none">
<div class="flex justify-between items-center w-full">
<div class="flex flex-col">
<span class="font-headline font-thin text-7xl opacity-90 text-on-surface">12:48</span>
</div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-primary text-2xl">calendar_today</span>
<span class="material-symbols-outlined text-primary text-2xl">signal_cellular_4_bar</span>
</div>
</div>
</header>
<!-- App Drawer Bottom Sheet -->
<div class="glass-panel w-full h-[618px] rounded-t-[28px] relative flex flex-col border-t border-white/10">
<!-- Center Handle Bar -->
<div class="w-full flex justify-center py-4">
<div class="w-12 h-1.5 bg-on-surface/20 rounded-full"></div>
</div>
<!-- Header of Panel -->
<div class="flex justify-between items-center px-8 pb-6">
<h2 class="text-2xl font-headline font-light tracking-tight text-on-surface">Apps</h2>
<button class="w-10 h-10 rounded-full flex items-center justify-center bg-white/5 hover:bg-white/10 transition-all active:scale-90">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</div>
<!-- App Grid Content -->
<div class="flex-1 overflow-y-auto px-6 pb-24">
<div class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-8 gap-y-10 gap-x-4">
<!-- App Item: Play Store -->
<div class="flex flex-col items-center gap-3 group transition-transform active:scale-90 cursor-pointer">
<div class="w-16 h-16 rounded-[1.5rem] bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-lg shadow-primary/10">
<span class="material-symbols-outlined text-on-primary-container text-4xl icon-fill">shop</span>
</div>
<span class="text-xs font-label text-on-surface-variant group-hover:text-on-surface transition-colors">Play Store</span>
</div>
<!-- App Item: Settings -->
<div class="flex flex-col items-center gap-3 group transition-transform active:scale-90 cursor-pointer">
<div class="w-16 h-16 rounded-[1.5rem] bg-surface-container-highest border border-white/5 flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-outline text-4xl">settings</span>
</div>
<span class="text-xs font-label text-on-surface-variant group-hover:text-on-surface transition-colors">Settings</span>
</div>
<!-- App Item: Camera -->
<div class="flex flex-col items-center gap-3 group transition-transform active:scale-90 cursor-pointer">
<div class="w-16 h-16 rounded-[1.5rem] bg-gradient-to-br from-secondary to-secondary-container flex items-center justify-center shadow-lg shadow-secondary/10">
<span class="material-symbols-outlined text-white text-4xl icon-fill">photo_camera</span>
</div>
<span class="text-xs font-label text-on-surface-variant group-hover:text-on-surface transition-colors">Camera</span>
</div>
<!-- App Item: Gmail -->
<div class="flex flex-col items-center gap-3 group transition-transform active:scale-90 cursor-pointer">
<div class="w-16 h-16 rounded-[1.5rem] bg-gradient-to-br from-error-container to-error-dim flex items-center justify-center shadow-lg shadow-error/10">
<span class="material-symbols-outlined text-on-error-container text-4xl icon-fill">mail</span>
</div>
<span class="text-xs font-label text-on-surface-variant group-hover:text-on-surface transition-colors">Gmail</span>
</div>
<!-- App Item: Maps -->
<div class="flex flex-col items-center gap-3 group transition-transform active:scale-90 cursor-pointer">
<div class="w-16 h-16 rounded-[1.5rem] bg-gradient-to-br from-tertiary-container to-tertiary flex items-center justify-center shadow-lg shadow-tertiary/10">
<span class="material-symbols-outlined text-on-tertiary-container text-4xl icon-fill">map</span>
</div>
<span class="text-xs font-label text-on-surface-variant group-hover:text-on-surface transition-colors">Maps</span>
</div>
<!-- App Item: WhatsApp -->
<div class="flex flex-col items-center gap-3 group transition-transform active:scale-90 cursor-pointer">
<div class="w-16 h-16 rounded-[1.5rem] bg-[#25D366]/20 border border-[#25D366]/30 flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-[#25D366] text-4xl icon-fill">chat</span>
</div>
<span class="text-xs font-label text-on-surface-variant group-hover:text-on-surface transition-colors">WhatsApp</span>
</div>
<!-- App Item: Browser -->
<div class="flex flex-col items-center gap-3 group transition-transform active:scale-90 cursor-pointer">
<div class="w-16 h-16 rounded-[1.5rem] bg-gradient-to-br from-primary-fixed-dim to-primary flex items-center justify-center shadow-lg shadow-primary/10">
<span class="material-symbols-outlined text-on-primary-fixed text-4xl icon-fill">language</span>
</div>
<span class="text-xs font-label text-on-surface-variant group-hover:text-on-surface transition-colors">Browser</span>
</div>
<!-- App Item: Photos -->
<div class="flex flex-col items-center gap-3 group transition-transform active:scale-90 cursor-pointer">
<div class="w-16 h-16 rounded-[1.5rem] bg-surface-bright flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-primary text-4xl icon-fill">image</span>
</div>
<span class="text-xs font-label text-on-surface-variant group-hover:text-on-surface transition-colors">Photos</span>
</div>
<!-- App Item: Music -->
<div class="flex flex-col items-center gap-3 group transition-transform active:scale-90 cursor-pointer">
<div class="w-16 h-16 rounded-[1.5rem] bg-gradient-to-br from-tertiary-fixed-dim to-tertiary-container flex items-center justify-center shadow-lg shadow-tertiary/10">
<span class="material-symbols-outlined text-white text-4xl">music_note</span>
</div>
<span class="text-xs font-label text-on-surface-variant group-hover:text-on-surface transition-colors">Music</span>
</div>
<!-- App Item: Calendar -->
<div class="flex flex-col items-center gap-3 group transition-transform active:scale-90 cursor-pointer">
<div class="w-16 h-16 rounded-[1.5rem] bg-white flex flex-col items-center justify-center shadow-lg">
<span class="text-error font-bold text-xs">MON</span>
<span class="text-surface font-black text-2xl">24</span>
</div>
<span class="text-xs font-label text-on-surface-variant group-hover:text-on-surface transition-colors">Calendar</span>
</div>
<!-- App Item: Files -->
<div class="flex flex-col items-center gap-3 group transition-transform active:scale-90 cursor-pointer">
<div class="w-16 h-16 rounded-[1.5rem] bg-surface-container-high border border-white/5 flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-primary-dim text-4xl icon-fill">folder</span>
</div>
<span class="text-xs font-label text-on-surface-variant group-hover:text-on-surface transition-colors">Files</span>
</div>
<!-- App Item: Clock -->
<div class="flex flex-col items-center gap-3 group transition-transform active:scale-90 cursor-pointer">
<div class="w-16 h-16 rounded-[1.5rem] bg-surface-container-highest flex items-center justify-center shadow-lg relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent"></div>
<span class="material-symbols-outlined text-on-surface text-4xl">schedule</span>
</div>
<span class="text-xs font-label text-on-surface-variant group-hover:text-on-surface transition-colors">Clock</span>
</div>
</div>
</div>
<!-- Shared Component: BottomNavBar (Mapping style_ keys) -->
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md h-16 rounded-full border border-white/15 bg-white/10 dark:bg-slate-900/10 backdrop-blur-3xl flex justify-between items-center px-6 z-50 shadow-[0_20px_50px_rgba(172,163,255,0.08)]">
<a class="p-3 text-white/60 hover:bg-white/5 transition-all duration-300 scale-95 active:scale-90" href="#">
<span class="material-symbols-outlined">search</span>
</a>
<a class="p-3 text-white/60 hover:bg-white/5 transition-all duration-300 scale-95 active:scale-90" href="#">
<span class="material-symbols-outlined">mic</span>
</a>
<a class="bg-[#ACA3FF]/20 text-[#ACA3FF] rounded-full p-3 hover:bg-white/5 transition-all duration-300 scale-95 active:scale-90" href="#">
<span class="material-symbols-outlined">apps</span>
</a>
</nav>
</div>
</div>
