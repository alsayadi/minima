name: OODA self-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  selfcheck:
    runs-on: ubuntu-latest
    name: Verify OODA diagnose engine (pure JVM)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download Kotlin compiler
        run: |
          curl -sSL -o kotlin.zip https://github.com/JetBrains/kotlin/releases/download/v2.1.0/kotlin-compiler-2.1.0.zip
          unzip -q kotlin.zip
          echo "$PWD/kotlinc/bin" >> $GITHUB_PATH

      - name: Run OODA rule self-check
        run: bash kotlinc/bin/kotlinc -script scripts/ooda_selfcheck.kts
